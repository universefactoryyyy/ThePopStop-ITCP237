<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Admin Orders - The Pop Stop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.22/js/dataTables.bootstrap4.min.js"></script>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">The Pop Stop</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="products.html"><i class="fas fa-box"></i> Products</a>
                <a href="users.html"><i class="fas fa-users"></i> Users</a>
                <a href="orders.html" class="active"><i class="fas fa-shopping-bag"></i> Orders</a>
                <a href="discounts.html"><i class="fas fa-tags"></i> Discounts</a>
                <a href="reviews.html"><i class="fas fa-star"></i> Reviews</a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="sidebar-back-btn"><i class="fas fa-store"></i> Back to Shop</a>
            </div>
        </aside>
        <main class="main-content">
            <h2 class="mb-4">Orders</h2>
            <table id="ordersTable" class="table table-striped">
                <thead><tr><th>Order ID</th><th>Customer</th><th>Email</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
            </table>
        </main>
    </div>
    <script>
    window.API_URL = window.API_URL || 'http://localhost:4000';
    $(document).ready(function() {
        const user = JSON.parse(sessionStorage.getItem('user') || 'null');
        if (!user || user.role !== 'admin') { window.location.href = '../index.html'; return; }
        const token = JSON.parse(sessionStorage.getItem('token'));
        const statuses = ['Pending','Processing','Shipped','Delivered','Cancelled'];
        const table = $('#ordersTable').DataTable({
            ajax: { url: `${window.API_URL}/api/v1/orders`, dataSrc: 'rows', headers: { Authorization: 'Bearer ' + token } },
            columns: [
                { data: 'id' },
                { data: 'User', render: u => u ? u.name : 'N/A' },
                { data: 'User', render: u => u ? u.email : 'N/A' },
                { data: 'total_amount', render: d => '₱' + parseFloat(d).toFixed(2) },
                { data: 'status' },
                { data: 'createdAt', render: d => new Date(d).toLocaleDateString() },
                { data: null, render: d => {
                    let opts = statuses.map(s => `<option value="${s}" ${s===d.status?'selected':''}>${s}</option>`).join('');
                    return `<select class="admin-select status-select mr-2" data-id="${d.id}" data-current="${d.status}">${opts}</select>
                            <button type="button" class="btn btn-sm btn-primary receipt-btn" data-id="${d.id}"><i class="fas fa-file-pdf"></i> Receipt</button>`;
                }}
            ]
        });
        $(document).on('change', '.status-select', function() {
            const select = $(this);
            const id = select.data('id');
            const newStatus = select.val();
            const currentStatus = select.data('current');
            
            if (newStatus === currentStatus) return;
            
            Swal.fire({
                title: 'Change order status?',
                text: `Are you sure you want to change the status from "${currentStatus}" to "${newStatus}"?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#FF3E72',
                cancelButtonColor: '#6c757d',
                confirmButtonText: 'Yes, change it!'
            }).then((result) => {
                if (result.isConfirmed) {
                    $.ajax({
                        method: 'PUT', url: `${window.API_URL}/api/v1/orders/${id}/status`,
                        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
                        data: JSON.stringify({ status: newStatus }),
                        success: () => {
                            table.ajax.reload();
                            Swal.fire({ icon: 'success', text: 'Status updated. Email sent with PDF receipt.', timer: 2000, showConfirmButton: false });
                        },
                        error: () => {
                            select.val(currentStatus);
                        }
                    });
                } else {
                    select.val(currentStatus);
                }
            });
        });

        $(document).on('click', '.receipt-btn', function() {
            const orderId = $(this).data('id');
            fetch(`${window.API_URL}/api/v1/orders/${orderId}/receipt`, {
                headers: { Authorization: 'Bearer ' + token }
            })
                .then(res => {
                    if (!res.ok) throw new Error('Failed to download receipt');
                    return res.blob();
                })
                .then(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `receipt-order-${orderId}.pdf`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);
                })
                .catch(() => Swal.fire({ icon: 'error', text: 'Could not download receipt PDF.' }));
        });
    });
    </script>
</body>
</html>
