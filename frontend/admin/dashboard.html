<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Admin Dashboard - The Pop Stop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="admin-layout" id="adminDashboard">
        <aside class="sidebar">
            <div class="sidebar-brand">The Pop Stop</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="products.html" data-page="products"><i class="fas fa-box"></i> Products</a>
                <a href="users.html" data-page="users"><i class="fas fa-users"></i> Users</a>
                <a href="orders.html" data-page="orders"><i class="fas fa-shopping-bag"></i> Orders</a>
                <a href="discounts.html" data-page="discounts"><i class="fas fa-tags"></i> Discounts</a>
                <a href="reviews.html" data-page="reviews"><i class="fas fa-star"></i> Reviews</a>
                <a href="reports.html" data-page="reports"><i class="fas fa-chart-bar"></i> Reports</a>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="sidebar-back-btn"><i class="fas fa-store"></i> Back to Shop</a>
            </div>
        </aside>
        <main class="main-content">
            <h2 class="mb-4">Dashboard</h2>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="statProducts">0</div><div class="stat-label">Total Products</div></div>
                <div class="stat-card"><div class="stat-value" id="statUsers">0</div><div class="stat-label">Total Users</div></div>
                <div class="stat-card"><div class="stat-value" id="statOrders">0</div><div class="stat-label">Total Orders</div></div>
                <div class="stat-card"><div class="stat-value" id="statRevenue">₱0</div><div class="stat-label">Total Revenue</div></div>
            </div>
            <div class="charts-grid-3">
                <div class="chart-container chart-compact"><h5>Orders (Last 7 Days)</h5><canvas id="barChart"></canvas></div>
                <div class="chart-container chart-compact"><h5>Revenue by Month</h5><canvas id="lineChart"></canvas></div>
                <div class="chart-container chart-compact"><h5>Sales by Brand</h5><canvas id="pieChart"></canvas></div>
            </div>
        </main>
    </div>
    <script src="../js/dashboard.js"></script>
    <script src="../js/charts.js"></script>
</body>
</html>
