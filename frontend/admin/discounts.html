<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Admin Discounts - The Pop Stop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.22/js/dataTables.bootstrap4.min.js"></script>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">The Pop Stop</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="products.html"><i class="fas fa-box"></i> Products</a>
                <a href="users.html"><i class="fas fa-users"></i> Users</a>
                <a href="orders.html"><i class="fas fa-shopping-bag"></i> Orders</a>
                <a href="discounts.html" class="active"><i class="fas fa-tags"></i> Discounts</a>
                <a href="reviews.html"><i class="fas fa-star"></i> Reviews</a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="sidebar-back-btn"><i class="fas fa-store"></i> Back to Shop</a>
            </div>
        </aside>
        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Discount Codes</h2>
                <button class="btn btn-primary" data-toggle="modal" data-target="#discountModal" id="addDiscountBtn"><i class="fas fa-plus"></i> Add Discount</button>
            </div>
            <table id="discountsTable" class="table table-striped">
                <thead>
                    <tr>
                        <th>Code</th><th>Description</th><th>Type</th><th>Value</th><th>Min Order</th>
                        <th>Uses</th><th>Status</th><th>Expires</th><th>Actions</th>
                    </tr>
                </thead>
            </table>
        </main>
    </div>

    <div class="modal fade" id="discountModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="discountModalTitle">Add Discount</h5>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="discountForm">
                        <input type="hidden" id="discountId">
                        <div class="form-group">
                            <label>Code</label>
                            <input type="text" id="code" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <input type="text" id="description" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Type</label>
                            <select id="discount_type" class="form-control">
                                <option value="percent">Percent (%)</option>
                                <option value="fixed">Fixed Amount (₱)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Value</label>
                            <input type="number" id="discount_value" class="form-control" min="0" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>Minimum Order (₱)</label>
                            <input type="number" id="min_order_amount" class="form-control" min="0" step="0.01" value="0">
                        </div>
                        <div class="form-group">
                            <label>Max Uses (leave blank for unlimited)</label>
                            <input type="number" id="max_uses" class="form-control" min="1">
                        </div>
                        <div class="form-group">
                            <label>Expires At</label>
                            <input type="datetime-local" id="expires_at" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="is_active" class="form-control">
                                <option value="1">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveDiscountBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    const API_URL = 'http://localhost:4000';
    let table;

    $(document).ready(function() {
        const user = JSON.parse(sessionStorage.getItem('user') || 'null');
        if (!user || user.role !== 'admin') { window.location.href = '../index.html'; return; }
        const token = JSON.parse(sessionStorage.getItem('token'));

        table = $('#discountsTable').DataTable({
            ajax: { url: `${API_URL}/api/v1/discounts`, dataSrc: 'rows', headers: { Authorization: 'Bearer ' + token } },
            columns: [
                { data: 'code' },
                { data: 'description', defaultContent: '-' },
                { data: 'discount_type', render: d => d === 'percent' ? 'Percent' : 'Fixed' },
                { data: null, render: d => d.discount_type === 'percent' ? `${d.discount_value}%` : `₱${parseFloat(d.discount_value).toFixed(2)}` },
                { data: 'min_order_amount', render: d => `₱${parseFloat(d).toFixed(2)}` },
                { data: null, render: d => `${d.used_count}${d.max_uses ? ' / ' + d.max_uses : ''}` },
                { data: 'is_active', render: d => d ? '<span class="badge badge-success">Active</span>' : '<span class="badge badge-danger">Inactive</span>' },
                { data: 'expires_at', render: d => d ? new Date(d).toLocaleString() : 'Never' },
                { data: null, render: d => `
                    <button class="btn btn-sm btn-secondary edit-btn" data-id="${d.id}"><i class="fas fa-edit"></i></button>
                    <button class="btn btn-sm btn-danger delete-btn" data-id="${d.id}"><i class="fas fa-trash"></i></button>` }
            ]
        });

        $('#addDiscountBtn').on('click', function() {
            $('#discountModalTitle').text('Add Discount');
            $('#discountForm')[0].reset();
            $('#discountId').val('');
        });

        $(document).on('click', '.edit-btn', function() {
            const row = table.row($(this).closest('tr')).data();
            $('#discountModalTitle').text('Edit Discount');
            $('#discountId').val(row.id);
            $('#code').val(row.code);
            $('#description').val(row.description || '');
            $('#discount_type').val(row.discount_type);
            $('#discount_value').val(row.discount_value);
            $('#min_order_amount').val(row.min_order_amount);
            $('#max_uses').val(row.max_uses || '');
            $('#is_active').val(row.is_active ? '1' : '0');
            if (row.expires_at) {
                const dt = new Date(row.expires_at);
                dt.setMinutes(dt.getMinutes() - dt.getTimezoneOffset());
                $('#expires_at').val(dt.toISOString().slice(0, 16));
            } else {
                $('#expires_at').val('');
            }
            $('#discountModal').modal('show');
        });

        $('#saveDiscountBtn').on('click', function() {
            const id = $('#discountId').val();
            const payload = {
                code: $('#code').val().trim(),
                description: $('#description').val().trim(),
                discount_type: $('#discount_type').val(),
                discount_value: parseFloat($('#discount_value').val()),
                min_order_amount: parseFloat($('#min_order_amount').val()) || 0,
                max_uses: $('#max_uses').val() ? parseInt($('#max_uses').val()) : null,
                is_active: parseInt($('#is_active').val()),
                expires_at: $('#expires_at').val() || null
            };
            $.ajax({
                method: id ? 'PUT' : 'POST',
                url: id ? `${API_URL}/api/v1/discounts/${id}` : `${API_URL}/api/v1/discounts`,
                headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
                data: JSON.stringify(payload),
                success: function() {
                    $('#discountModal').modal('hide');
                    table.ajax.reload();
                    Swal.fire({ icon: 'success', text: 'Discount saved!', timer: 1200, showConfirmButton: false });
                },
                error: function(xhr) {
                    Swal.fire({ icon: 'error', text: xhr.responseJSON?.error || 'Failed to save discount.' });
                }
            });
        });

        $(document).on('click', '.delete-btn', function() {
            const id = $(this).data('id');
            Swal.fire({ title: 'Delete discount?', icon: 'warning', showCancelButton: true }).then(result => {
                if (!result.isConfirmed) return;
                $.ajax({
                    method: 'DELETE',
                    url: `${API_URL}/api/v1/discounts/${id}`,
                    headers: { Authorization: 'Bearer ' + token },
                    success: function() {
                        table.ajax.reload();
                        Swal.fire({ icon: 'success', text: 'Deleted!', timer: 1000, showConfirmButton: false });
                    }
                });
            });
        });
    });
    </script>
</body>
</html>
