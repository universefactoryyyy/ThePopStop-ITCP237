<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Admin Reviews - The Pop Stop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.22/js/dataTables.bootstrap4.min.js"></script>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">The Pop Stop</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="products.html"><i class="fas fa-box"></i> Products</a>
                <a href="users.html"><i class="fas fa-users"></i> Users</a>
                <a href="orders.html"><i class="fas fa-shopping-bag"></i> Orders</a>
                <a href="discounts.html"><i class="fas fa-tags"></i> Discounts</a>
                <a href="reviews.html" class="active"><i class="fas fa-star"></i> Reviews</a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="sidebar-back-btn"><i class="fas fa-store"></i> Back to Shop</a>
            </div>
        </aside>
        <main class="main-content">
            <h2 class="mb-4">Reviews</h2>
            <table id="reviewsTable" class="table table-striped">
                <thead><tr><th>ID</th><th>Product</th><th>User</th><th>Rating</th><th>Comment</th><th>Approved</th><th>Actions</th></tr></thead>
            </table>
        </main>
    </div>
    <script>
    window.API_URL = window.API_URL || 'http://localhost:4000';
    $(document).ready(function() {
        const user = JSON.parse(sessionStorage.getItem('user') || 'null');
        if (!user || user.role !== 'admin') { window.location.href = '../index.html'; return; }
        const token = JSON.parse(sessionStorage.getItem('token'));
        const table = $('#reviewsTable').DataTable({
            ajax: { url: `${window.API_URL}/api/v1/reviews`, dataSrc: 'rows', headers: { Authorization: 'Bearer ' + token } },
            columns: [
                { data: 'id' },
                { data: 'Product', render: p => p ? p.name : 'N/A' },
                { data: 'User', render: u => u ? u.name : 'N/A' },
                { data: 'rating' },
                { data: 'review_text', render: d => d ? d.substring(0, 50) + (d.length > 50 ? '...' : '') : '' },
                { data: 'is_approved', render: d => d ? '<span class="badge badge-success">Yes</span>' : '<span class="badge badge-warning">No</span>' },
                { data: null, render: d => `
                    <button class="btn btn-sm btn-secondary approve-btn" data-id="${d.id}">${d.is_approved?'Unapprove':'Approve'}</button>
                    <button class="btn btn-sm btn-danger delete-btn" data-id="${d.id}"><i class="fas fa-trash"></i></button>` }
            ]
        });
        $(document).on('click', '.approve-btn', function() {
            $.ajax({ method:'PUT', url:`${window.API_URL}/api/v1/reviews/${$(this).data('id')}/approve`, headers:{Authorization:'Bearer '+token}, success:()=>{ table.ajax.reload(); Swal.fire({icon:'success',text:'Updated',timer:1000,showConfirmButton:false}); } });
        });
        $(document).on('click', '.delete-btn', function() {
            Swal.fire({title:'Delete review?',icon:'warning',showCancelButton:true}).then(r=>{
                if(r.isConfirmed) $.ajax({ method:'DELETE', url:`${window.API_URL}/api/v1/reviews/${$(this).data('id')}`, headers:{Authorization:'Bearer '+token}, success:()=>{ table.ajax.reload(); Swal.fire({icon:'success',text:'Deleted',timer:1000,showConfirmButton:false}); } });
            });
        });
    });
    </script>
</body>
</html>
