<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile - The Pop Stop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
</head>
<body>
    <div id="navbar"></div>
    <div class="page-container">
        <div class="form-wrap" style="max-width:600px;">
            <h2 class="form-title"><i class="fas fa-user"></i> My Profile</h2>
            <p class="text-center mb-3"><strong id="userName"></strong><br><span id="userEmail" class="text-muted"></span></p>
            <form id="profileForm" enctype="multipart/form-data">
                <div class="text-center mb-3">
                    <img id="avatarPreview" src="images/placeholder.svg" width="100" height="100" style="border-radius:50%;object-fit:cover;border:3px solid var(--pastel-border);">
                </div>
                <div class="form-group">
                    <label for="avatar">Profile Photo</label>
                    <input type="file" id="avatar" name="image" class="form-control" accept="image/*">
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" name="fname" class="form-control">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" name="lname" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label for="addressline">Address</label>
                    <textarea id="addressline" name="addressline" class="form-control" rows="2"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="zipcode">Zip Code</label>
                        <input type="text" id="zipcode" name="zipcode" class="form-control">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="phone">Phone</label>
                        <input type="text" id="phone" name="phone" class="form-control">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-save"></i> Update Profile</button>
            </form>
        </div>
    </div>
    <div id="footer"></div>
    <script>
        // Manually load navbar first to ensure it's available
        $(document).ready(function() {
            $('#navbar').load('header.html', function() {
                // Initialize after load is complete
                const user = JSON.parse(sessionStorage.getItem('user'));
                if (user) {
                    $('#authLinks').hide();
                    $('#userLinks').show();
                    if (user.avatar) {
                        $('#userAvatar').attr('src', 'http://localhost:4000' + user.avatar);
                    }
                    if (user.role === 'admin') {
                        $('#adminLink').show();
                    }
                    $('#logoutBtn').on('click', function(e) {
                        e.preventDefault();
                        sessionStorage.clear();
                        window.location.href = 'index.html';
                    });
                }
            });
            // Load footer too
            $('#footer').load('footer.html');
        });
    </script>
    <script src="js/user.js"></script>
</body>
</html>
