<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cart - The Pop Stop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
</head>
<body>
    <div id="navbar"></div>
    <div class="page-container">
        <h2 class="mb-4"><i class="fas fa-shopping-cart"></i> Shopping Cart</h2>
        <div class="card">
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th style="width:40px;"><input type="checkbox" id="selectAllCart" checked title="Select all"></th>
                            <th>Image</th>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th>Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="cartBody"></tbody>
                </table>
                <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap">
                    <div>
                        <h4 class="mb-0">Selected total: <span id="cartTotal">₱0.00</span></h4>
                        <small class="text-muted"><span id="selectedCount">0</span> of <span id="cartItemCount">0</span> items selected for checkout</small>
                    </div>
                    <button type="button" id="checkoutBtn" class="btn btn-primary mt-2 mt-md-0" style="display:none;"><i class="fas fa-credit-card"></i> Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </div>
    <div id="footer"></div>
    <script src="js/catalog.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
