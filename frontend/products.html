<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products - The Pop Stop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>
<body>
    <div id="navbar"></div>
    <div class="page-container">
        <h2 class="mb-3"><i class="fas fa-box-open"></i> All Products</h2>
        <div class="filter-panel">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="searchInput">Search</label>
                    <input type="text" id="searchInput" class="form-control" placeholder="Search by name, brand, series...">
                </div>
                <div class="filter-group">
                    <label for="brandFilter">Brand</label>
                    <select id="brandFilter" class="form-control">
                        <option value="">All Brands</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="seriesFilter">Series</label>
                    <select id="seriesFilter" class="form-control">
                        <option value="">All Series</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="statusFilter">Stock Status</label>
                    <select id="statusFilter" class="form-control">
                        <option value="">All Status</option>
                        <option value="In Stock">In Stock</option>
                        <option value="Low Stock">Low Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sortFilter">Sort By</label>
                    <select id="sortFilter" class="form-control">
                        <option value="">Newest</option>
                        <option value="price_asc">Price: Low to High</option>
                        <option value="price_desc">Price: High to Low</option>
                    </select>
                </div>
                <div class="filter-group">
                    <button type="button" id="clearFilters" class="btn btn-secondary btn-block"><i class="fas fa-undo"></i> Clear</button>
                </div>
            </div>
        </div>
        <div id="productGrid" class="product-grid"></div>
        <div id="pagination" class="pagination-wrap"></div>
        <div id="footer"></div>
    </div>
    <script src="js/catalog.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
