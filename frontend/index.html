<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Pop Stop - Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>
<body>
    <div id="navbar"></div>
    <section class="hero">
        <div class="hero-shop-name">The Pop Stop</div>
        <h1>Collectibles & Figurines</h1>
        <p>Discover POP MART, Funko, and more at The Pop Stop</p>
        <div class="search-wrap">
            <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
        </div>
    </section>
    <div id="brandFilters" class="brand-filters"></div>
    <div id="productGrid" class="product-grid"></div>
    <div id="pagination" class="pagination-wrap"></div>
    <div id="footer"></div>
    <script src="js/catalog.js"></script>
    <script src="js/home.js"></script>
    <script>
        // Load footer directly for home page
        $(document).ready(function() {
            $('#footer').load('footer.html');
        });
    </script>
</body>
</html>
