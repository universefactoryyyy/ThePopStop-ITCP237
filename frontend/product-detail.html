<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Detail - The Pop Stop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css">
    <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
</head>
<body>
    <div id="navbar"></div>
    <div class="product-detail-wrap">
        <div class="product-gallery">
            <img id="mainImage" src="images/placeholder.svg" alt="Product">
            <div id="galleryThumbs" class="product-gallery-thumbs mt-2"></div>
        </div>
        <div>
            <h1 id="productName"></h1>
            <p class="text-muted" id="productBrand"></p>
            <p><strong>SKU:</strong> <span id="productSku"></span></p>
            <h3 class="product-price" id="productPrice"></h3>
            <p><strong>Status:</strong> <span id="productStatus"></span></p>
            <p id="productDesc" class="mt-3"></p>
            <div class="form-inline mt-3">
                <label class="mr-2">Qty:</label>
                <input type="number" id="qtyInput" class="form-control mr-2" value="1" min="1" style="width:80px;">
                <button id="addCartBtn" class="btn btn-primary"><i class="fas fa-cart-plus"></i> Add to Cart</button>
            </div>
        </div>
    </div>
    <div class="page-container">
        <h3 class="mb-3"><i class="fas fa-star"></i> Reviews</h3>
        <div id="reviewsList"></div>
        <p id="noReviewMsg" class="text-muted" style="display:none;">Login and complete a delivered order to write a review.</p>
        <div id="reviewFormWrap" class="card mt-4" style="display:none;">
            <div class="card-body">
                <h5 id="reviewFormTitle">Write a Review</h5>
                <p class="text-muted small">Reviews are only allowed for products from <strong>delivered</strong> orders.</p>
                <form id="reviewForm">
                    <input type="hidden" id="editReviewId" value="">
                    <div class="form-group">
                        <label for="reviewOrderId">Delivered Order</label>
                        <select id="reviewOrderId" class="form-control" style="max-width:280px;"></select>
                        <span class="error-msg" id="orderError">Select a delivered order.</span>
                    </div>
                    <div class="form-group">
                        <label for="reviewRating">Rating (1-5)</label>
                        <select id="reviewRating" class="form-control" style="width:100px;">
                            <option value="">--</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                        <span class="error-msg" id="ratingError">Rating is required.</span>
                    </div>
                    <div class="form-group mb-0">
                        <label for="reviewText">Comment (max 500 chars)</label>
                        <textarea id="reviewText" class="form-control" rows="3" maxlength="500" placeholder="Share your experience..."></textarea>
                        <span class="error-msg" id="textError">Comment too long.</span>
                        <span class="form-hint">Inappropriate words will be automatically filtered.</span>
                    </div>
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary" id="reviewSubmitBtn"><i class="fas fa-paper-plane"></i> Submit Review</button>
                        <button type="button" class="btn btn-secondary ml-2" id="cancelEditBtn" style="display:none;">Cancel Edit</button>
                    </div>
                </form>
            </div>
        </div>
        <div id="myReviewsWrap" class="mt-4" style="display:none;">
            <h5>Your Reviews</h5>
            <div id="myReviewsList"></div>
        </div>
    </div>
    <script src="js/catalog.js"></script>
    <script src="js/product.js"></script>
</body>
</html>
